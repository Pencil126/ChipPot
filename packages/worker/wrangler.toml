name = "chippot"
main = "src/index.ts"
compatibility_date = "2025-11-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

# Admin API: same-origin with the admin SPA (Pages) so the Access JWT reaches the worker.
# Worker routes take precedence over Pages on the same hostname for matching paths.
routes = [
  { pattern = "chippot-admin.pencil126.cc/api/*", zone_name = "pencil126.cc" },
]

[[d1_databases]]
binding = "DB"
database_name = "chippot"
database_id = "722a14d6-efa6-4c90-9f1f-c216dec67804"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "chippot"

# Non-secret Discord config (public values). Bot token is a secret (wrangler secret put).
[vars]
DISCORD_APPLICATION_ID = "1512731062122451025"
DISCORD_PUBLIC_KEY = "52b904364f6481447197ef3570b1ec85b53c4a1d4ec2e390a9d4179fc3f793f0"
WEB_ORIGIN = "https://chippot-pay.pencil126.cc"
ADMIN_ORIGIN = "https://chippot-admin.pencil126.cc"
ACCESS_TEAM_DOMAIN = "pencil126"
ACCESS_AUD = "89316e15bc049081abccdaa377b1417f6efb197f27f45e35a4955c6c2f3669b7"
# ⚠️ Set this to YOUR Cloudflare Access email before deploying — it's the admin allow-list.
# Deploying with the placeholder will lock you out of the admin UI.
ACCESS_ALLOWED_EMAILS = "owner@example.com"

# 01:00 UTC = 09:00 Asia/Taipei, daily.
[triggers]
crons = ["0 5 * * *"]
